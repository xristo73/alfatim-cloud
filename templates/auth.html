<!DOCTYPE html>
<html>
<head>
    <title>Chmura AlfaTim</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
<style>
body {
    background-image: url("{{ url_for('static', filename='tlo.png') }}");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

.overlay {
    backdrop-filter: blur(6px);
    background: rgba(255,255,255,0.3);
    min-height: 100vh;
}
</style>

</head>

<body class="min-h-screen flex items-center justify-center text-gray-800">

<div class="w-full max-w-md">

    <div class="text-center mb-8">
        <h1 class="text-3xl font-semibold">☁Chmura AlfaTim</h1>
    </div>

    <div class="bg-white rounded-3xl shadow-sm p-8">

        <!-- LOGIN -->
        <h2 class="text-lg font-medium mb-4">Logowanie</h2>
        <form action="/login" method="POST" class="space-y-4 mb-8">
            <input type="text" name="username" placeholder="Login"
                   class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-black">

            <input type="password" name="password" placeholder="Hasło"
                   class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-black">

            <button type="submit"
                    class="w-full bg-black text-white py-3 rounded-full text-sm hover:opacity-90 transition">
                Zaloguj się
            </button>
        </form>

        <div class="border-t border-gray-100 my-6"></div>

        <!-- REGISTER -->
        <h2 class="text-lg font-medium mb-4">Rejestracja</h2>
        <form action="/register" method="POST" class="space-y-4">
            <input type="text" name="username" placeholder="Nowy login"
                   class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-black">

            <input type="password" name="password" placeholder="Nowe hasło"
                   class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-black">

            <button type="submit"
                    class="w-full border border-black py-3 rounded-full text-sm hover:bg-black hover:text-white transition">
                Utwórz konto
            </button>
        </form>

    </div>

</div>

</body>
</html>
